<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif;background:#0d0d1a;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.bg{position:fixed;top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse at 30% 20%,rgba(99,102,241,.15),transparent 60%),radial-gradient(ellipse at 70% 80%,rgba(139,92,246,.12),transparent 60%);pointer-events:none}
.card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:40px 32px;width:100%;max-width:340px;position:relative;z-index:1}
.icon{width:56px;height:56px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 28px}
.input-wrap{position:relative;margin-bottom:12px}
input[type=password],input[type=text]{width:100%;padding:14px 48px 14px 16px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:11px;color:#e2e2e2;font-size:15px;font-family:inherit;outline:none;transition:border-color .2s;letter-spacing:3px}
input::placeholder{letter-spacing:0;color:#4b5563;font-size:14px}
input:focus{border-color:#7c3aed;box-shadow:0 0 0 3px rgba(124,58,237,.2)}
.eye{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:#6b7280;cursor:pointer;font-size:18px;line-height:1;padding:4px}
.eye:hover{color:#a78bfa}
.btn{width:100%;padding:14px;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;border:none;border-radius:11px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s;margin-top:4px}
.btn:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 8px 24px rgba(99,102,241,.4)}
.btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
.err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:10px;padding:11px 14px;color:#f87171;font-size:13px;margin-top:12px;display:none;text-align:center}
.spin{width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}
</style>
</head>
<body>
<div class="bg"></div>
<div class="card">
  <div class="icon">💰</div>
  <div class="input-wrap">
    <input type="password" id="pw" placeholder="비밀번호" onkeydown="if(event.key==='Enter')login()" autofocus autocomplete="current-password">
    <button class="eye" id="eyeBtn" onclick="toggleEye()" type="button">👁</button>
  </div>
  <button class="btn" id="loginBtn" onclick="login()">🔐 로그인</button>
  <div class="err" id="err">비밀번호가 올바르지 않습니다</div>
</div>
<script>
const SALT='yblog_salt_2024';
const DEFAULT_HASH='af176805df287cd3b56f650be6d6d30e2ffe88fa724b37121c51d79d87d1de58';
async function sha256(s){const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('');}
async function login(){
  const pw=document.getElementById('pw').value;
  if(!pw)return;
  const btn=document.getElementById('loginBtn');
  btn.disabled=true;btn.innerHTML='<div class="spin"></div>';
  const stored=localStorage.getItem('yblog_pw_hash')||DEFAULT_HASH;
  const hash=await sha256(pw+SALT);
  if(hash===stored){
    sessionStorage.setItem('yblog_auth','1');
    btn.innerHTML='✅';
    setTimeout(()=>{window.location.href='app.html';},400);
  }else{
    btn.disabled=false;btn.innerHTML='🔐 로그인';
    const e=document.getElementById('err');
    e.style.display='block';e.style.animation='none';
    setTimeout(()=>e.style.animation='shake .3s',10);
  }
}
function toggleEye(){
  const i=document.getElementById('pw'),b=document.getElementById('eyeBtn');
  i.type=i.type==='password'?'text':'password';b.textContent=i.type==='password'?'👁':'🙈';
}
if(sessionStorage.getItem('yblog_auth'))window.location.href='app.html';
</script>
</body>
</html>
